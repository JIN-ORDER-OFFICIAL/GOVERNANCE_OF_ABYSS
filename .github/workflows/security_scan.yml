name: Purity Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify File Purity
        run: |
          # 1. Windowsの変な改行（CRLF）を掃除する
          sed -i 's/\r//g' SECURITY_AUDIT_LOG.txt
          
          # 2. ママのPC住所を消してファイル名だけにする
          sed -i 's/.*\\//' SECURITY_AUDIT_LOG.txt
          
          # 3. リストにあるファイルだけをチェックする魔法
          cut -d' ' -f1 SECURITY_AUDIT_LOG.txt > hashes.txt
          cut -d' ' -f3 SECURITY_AUDIT_LOG.txt > files.txt
          paste -d' ' hashes.txt files.txt > final_audit.txt
          
          # 4. 実行！
          sha256sum -c final_audit.txt
