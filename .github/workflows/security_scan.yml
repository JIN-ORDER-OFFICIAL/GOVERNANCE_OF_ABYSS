name: Purity Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify File Purity
        run: |
          # 1. 住所をファイル名だけにする（より強力な魔法）
          sed -i 's/.*\\//' SECURITY_AUDIT_LOG.txt
          
          # 2. 中身を表示して確認（ロボットのログに残す）
          cat SECURITY_AUDIT_LOG.txt
          
          # 3. チェック実行
          sha256sum -c SECURITY_AUDIT_LOG.txt
