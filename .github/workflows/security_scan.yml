name: Purity Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fix Path and Verify Purity
        run: |
          echo "Converting paths and scanning for impurities..."
          # ママのPC住所（C:\Users\...）を消して、ファイル名だけにする魔法
          sed -i 's|C:.*\\||g' SECURITY_AUDIT_LOG.txt
          # バックスラッシュをスラッシュに変換する魔法
          sed -i 's|\\|/|g' SECURITY_AUDIT_LOG.txt
          
          # 修正されたリストでチェック開始！
          sha256sum -c SECURITY_AUDIT_LOG.txt
