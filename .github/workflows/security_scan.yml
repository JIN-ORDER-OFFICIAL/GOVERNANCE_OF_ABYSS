name: Purity Security Scan
on:
  push:
    branches: [ "main" ]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Verify File Purity
        run: |
          # フォルダ内の .txt ファイルを探して、強引にチェックを実行する
          find . -name "*.txt" -exec sha256sum -c {} +
